<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGradient">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.8" />
    </radialGradient>

    <!-- Ambient glow filter -->
    <filter id="ambientGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#8B5CF6" flood-opacity="0.35"/>
      <feDropShadow dx="0" dy="0" stdDeviation="6" flood-color="#6366F1" flood-opacity="0.15"/>
    </filter>
  </defs>

  <style>
    /* Gentle glow breathing on the whole logo */
    @keyframes glowBreath {
      0%, 100% { filter: url(#ambientGlow) brightness(1); }
      50% { filter: url(#ambientGlow) brightness(1.12); }
    }

    /* Connection lines gentle opacity pulse */
    @keyframes linePulse {
      0%, 100% { opacity: 0.5; }
      50% { opacity: 0.8; }
    }

    /* Orbit ring gentle opacity */
    @keyframes orbitPulse {
      0%, 100% { opacity: 0.2; }
      50% { opacity: 0.4; }
    }

    /* Node glow pulse */
    @keyframes nodePulse {
      0%, 100% { opacity: 0.8; }
      50% { opacity: 1; }
    }

    .logo-group {
      animation: glowBreath 5s ease-in-out infinite;
    }

    .connection-line {
      animation: linePulse 3s ease-in-out infinite;
    }

    .orbit-ring {
      animation: orbitPulse 4s ease-in-out infinite;
    }

    .orbital-node {
      animation: nodePulse 3s ease-in-out infinite;
    }
  </style>

  <g class="logo-group">
    <!-- Center node -->
    <circle cx="32" cy="32" r="8" fill="url(#centerGradient)"/>

    <!-- Orbital nodes — static positions, gentle glow -->
    <circle class="orbital-node" cx="32" cy="12" r="5" fill="#6366F1"/>
    <circle class="orbital-node" cx="48" cy="20" r="5" fill="#8B5CF6" style="animation-delay: 0.5s"/>
    <circle class="orbital-node" cx="48" cy="44" r="5" fill="#EC4899" style="animation-delay: 1.0s"/>
    <circle class="orbital-node" cx="32" cy="52" r="5" fill="#06B6D4" style="animation-delay: 1.5s"/>
    <circle class="orbital-node" cx="16" cy="44" r="5" fill="#8B5CF6" style="animation-delay: 2.0s"/>
    <circle class="orbital-node" cx="16" cy="20" r="5" fill="#6366F1" style="animation-delay: 2.5s"/>

    <!-- Connection lines — gentle pulse -->
    <path class="connection-line" d="M 32 32 L 32 12" stroke="url(#iconGradient)" stroke-width="2"/>
    <path class="connection-line" d="M 32 32 L 48 20" stroke="url(#iconGradient)" stroke-width="2" style="animation-delay: 0.5s"/>
    <path class="connection-line" d="M 32 32 L 48 44" stroke="url(#iconGradient)" stroke-width="2" style="animation-delay: 1.0s"/>
    <path class="connection-line" d="M 32 32 L 32 52" stroke="url(#iconGradient)" stroke-width="2" style="animation-delay: 1.5s"/>
    <path class="connection-line" d="M 32 32 L 16 44" stroke="url(#iconGradient)" stroke-width="2" style="animation-delay: 2.0s"/>
    <path class="connection-line" d="M 32 32 L 16 20" stroke="url(#iconGradient)" stroke-width="2" style="animation-delay: 2.5s"/>

    <!-- Dashed orbit ring — gentle pulse -->
    <circle class="orbit-ring" cx="32" cy="32" r="24" fill="none"
            stroke="url(#iconGradient)" stroke-width="1" stroke-dasharray="2 4"/>
  </g>
</svg>