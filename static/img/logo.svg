<?xml version="1.0" encoding="UTF-8"?>
<svg width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366F1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#EC4899;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="centerGradient">
      <stop offset="0%" style="stop-color:#8B5CF6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366F1;stop-opacity:0.8" />
    </radialGradient>
  </defs>

  <g>
    <!-- Center node -->
    <circle cx="32" cy="32" r="8" fill="url(#centerGradient)"/>

    <!-- Orbital nodes -->
    <circle cx="32" cy="12" r="5" fill="#6366F1"/>
    <circle cx="48" cy="20" r="5" fill="#8B5CF6"/>
    <circle cx="48" cy="44" r="5" fill="#EC4899"/>
    <circle cx="32" cy="52" r="5" fill="#06B6D4"/>
    <circle cx="16" cy="44" r="5" fill="#8B5CF6"/>
    <circle cx="16" cy="20" r="5" fill="#6366F1"/>

    <!-- Connection lines -->
    <path d="M 32 32 L 32 12" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <path d="M 32 32 L 48 20" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <path d="M 32 32 L 48 44" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <path d="M 32 32 L 32 52" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <path d="M 32 32 L 16 44" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>
    <path d="M 32 32 L 16 20" stroke="url(#iconGradient)" stroke-width="2" opacity="0.6"/>

    <!-- Dashed orbit ring -->
    <circle cx="32" cy="32" r="24" fill="none"
            stroke="url(#iconGradient)" stroke-width="1" stroke-dasharray="2 4" opacity="0.3"/>
  </g>
</svg>
