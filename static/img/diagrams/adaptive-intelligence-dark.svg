<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1120 640" width="1120" height="640">
  <defs>
    <linearGradient id="ai-brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#6366f1" />
      <stop offset="50%" stop-color="#8b5cf6" />
      <stop offset="100%" stop-color="#ec4899" />
    </linearGradient>
    <style>
      .bg { fill: #0f172a; }
      .lane-bg { fill: rgba(99, 102, 241, 0.06); stroke: rgba(165, 180, 252, 0.25); stroke-width: 1; }
      .card { fill: rgba(30, 27, 75, 0.55); stroke: #a5b4fc; stroke-width: 1.5; }
      .trigger { fill: rgba(244, 114, 182, 0.10); stroke: #f9a8d4; stroke-width: 1; }
      .handler { fill: rgba(167, 139, 250, 0.12); stroke: #c4b5fd; stroke-width: 1.25; }
      .state { fill: rgba(34, 211, 238, 0.10); stroke: #67e8f9; stroke-width: 1.25; }
      .turn { fill: rgba(52, 211, 153, 0.10); stroke: #6ee7b7; stroke-width: 1.25; }
      .arrow { stroke: #a5b4fc; stroke-width: 1.5; fill: none; }
      .arrow-soft { stroke: rgba(165, 180, 252, 0.4); stroke-width: 1; fill: none; stroke-dasharray: 4 3; }
      .h1 { font: 700 18px Inter, system-ui, sans-serif; fill: #f5f3ff; }
      .h2 { font: 600 13px Inter, system-ui, sans-serif; fill: #c7d2fe; }
      .h3 { font: 600 11px Inter, system-ui, sans-serif; fill: #c4b5fd; letter-spacing: 0.04em; text-transform: uppercase; }
      .b { font: 500 11px Inter, system-ui, sans-serif; fill: #e2e8f0; }
      .m { font: 11px 'JetBrains Mono', ui-monospace, monospace; fill: #a5b4fc; }
      .lbl { font: 600 10px Inter, system-ui, sans-serif; fill: #94a3b8; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
    <marker id="ai-arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6366f1" />
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1120" height="640"/>

  <text x="40" y="38" class="h1">Adaptive Prompt Intelligence · Per-turn metaprompting + state-driven re-personalization</text>
  <line x1="40" y1="52" x2="1080" y2="52" stroke="url(#ai-brand)" stroke-width="2" />

  <!-- Per-turn loop (top band) -->
  <rect x="40" y="74" width="1040" height="116" rx="12" class="lane-bg" />
  <text x="56" y="100" class="h3">Per-turn assembly loop</text>

  <rect x="56" y="112" width="184" height="64" rx="8" class="turn" />
  <text x="68" y="132" class="b">User message arrives</text>
  <text x="68" y="148" class="m">Conversation history + working</text>
  <text x="68" y="160" class="m">memory + retrieved traces</text>

  <rect x="264" y="112" width="200" height="64" rx="8" class="handler" />
  <text x="276" y="132" class="b">PromptEngine.assemble()</text>
  <text x="276" y="148" class="m">Merges persona + mood +</text>
  <text x="276" y="160" class="m">contextual elements + skills</text>

  <rect x="488" y="112" width="200" height="64" rx="8" class="handler" />
  <text x="500" y="132" class="b">MetapromptExecutor</text>
  <text x="500" y="148" class="m">checkAndTriggerMetaprompts()</text>
  <text x="500" y="160" class="m">3 trigger types · parallel exec</text>

  <rect x="712" y="112" width="184" height="64" rx="8" class="state" />
  <text x="724" y="132" class="b">State updates applied</text>
  <text x="724" y="148" class="m">mood · userContext ·</text>
  <text x="724" y="160" class="m">taskContext · imprints</text>

  <rect x="920" y="112" width="144" height="64" rx="8" class="card" />
  <text x="932" y="132" class="b">LLM call</text>
  <text x="932" y="148" class="m">Fresh system prompt</text>
  <text x="932" y="160" class="m">reflects every change</text>

  <path d="M 240 144 L 262 144" class="arrow" marker-end="url(#ai-arrow)" />
  <path d="M 464 144 L 486 144" class="arrow" marker-end="url(#ai-arrow)" />
  <path d="M 688 144 L 710 144" class="arrow" marker-end="url(#ai-arrow)" />
  <path d="M 896 144 L 918 144" class="arrow" marker-end="url(#ai-arrow)" />

  <!-- Three trigger lanes (middle band) -->
  <text x="40" y="218" class="h3">Three metaprompt trigger types</text>

  <!-- Lane: turn_interval -->
  <rect x="40" y="228" width="340" height="220" rx="12" class="lane-bg" />
  <text x="56" y="252" class="h2">turn_interval</text>
  <text x="56" y="268" class="b">Periodic self-regulation</text>
  <rect x="56" y="280" width="308" height="54" rx="6" class="trigger" />
  <text x="68" y="298" class="b">{ type: 'turn_interval',</text>
  <text x="68" y="314" class="b">&#160;&#160;intervalTurns: 5 }</text>
  <text x="68" y="326" class="lbl">Counter increments each turn</text>

  <rect x="56" y="346" width="308" height="92" rx="6" class="handler" />
  <text x="68" y="364" class="b">Built-in handlers fire on cadence:</text>
  <text x="68" y="380" class="m">• gmi_self_reflection</text>
  <text x="68" y="394" class="m">• gmi_self_trait_adjustment</text>
  <text x="68" y="408" class="m">• gmi_strategy_review</text>
  <text x="68" y="424" class="lbl">Each fires once per N turns</text>

  <!-- Lane: event_based -->
  <rect x="392" y="228" width="340" height="220" rx="12" class="lane-bg" />
  <text x="408" y="252" class="h2">event_based</text>
  <text x="408" y="268" class="b">SentimentTracker-driven</text>
  <rect x="408" y="280" width="308" height="54" rx="6" class="trigger" />
  <text x="420" y="298" class="b">{ type: 'event_based',</text>
  <text x="420" y="314" class="b">&#160;&#160;eventName: 'frustration_detected' }</text>
  <text x="420" y="326" class="lbl">Fires only on pending GMIEvent</text>

  <rect x="408" y="346" width="308" height="92" rx="6" class="handler" />
  <text x="420" y="364" class="b">Built-in event handlers:</text>
  <text x="420" y="380" class="m">• frustration_recovery</text>
  <text x="420" y="394" class="m">• confusion_clarification</text>
  <text x="420" y="408" class="m">• satisfaction_reinforcement</text>
  <text x="420" y="422" class="m">• error_recovery · engagement_boost</text>
  <text x="420" y="436" class="lbl">Sentiment tracking is opt-in</text>

  <!-- Lane: manual -->
  <rect x="744" y="228" width="336" height="220" rx="12" class="lane-bg" />
  <text x="760" y="252" class="h2">manual</text>
  <text x="760" y="268" class="b">Host- or tool-driven</text>
  <rect x="760" y="280" width="304" height="54" rx="6" class="trigger" />
  <text x="772" y="298" class="b">{ type: 'manual' }</text>
  <text x="772" y="314" class="b">workingMemory.set(flag)</text>
  <text x="772" y="326" class="lbl">Custom triggers from host code</text>

  <rect x="760" y="346" width="304" height="92" rx="6" class="handler" />
  <text x="772" y="364" class="b">Use cases:</text>
  <text x="772" y="380" class="m">• Tool result triggers re-plan</text>
  <text x="772" y="394" class="m">• User explicitly asks "re-think"</text>
  <text x="772" y="408" class="m">• adapt_personality emergent call</text>
  <text x="772" y="422" class="m">• Drift-mechanism flag</text>
  <text x="772" y="436" class="lbl">Generic handler signature</text>

  <!-- Bottom band: state surfaces metaprompts can mutate -->
  <rect x="40" y="466" width="1040" height="158" rx="12" class="lane-bg" />
  <text x="56" y="492" class="h3">State surfaces metaprompts can mutate</text>
  <text x="56" y="510" class="h2">Mutations flow back through callbacks · all reflected in next turn's prompt</text>

  <rect x="56" y="524" width="186" height="84" rx="8" class="state" />
  <text x="68" y="544" class="b">GMI mood</text>
  <text x="68" y="560" class="m">currentGmiMood</text>
  <text x="68" y="574" class="lbl">Valence · Arousal · Dominance</text>
  <text x="68" y="592" class="m">onMoodUpdate(mood)</text>

  <rect x="262" y="524" width="186" height="84" rx="8" class="state" />
  <text x="274" y="544" class="b">User context</text>
  <text x="274" y="560" class="m">UserContext (typed)</text>
  <text x="274" y="574" class="lbl">Inferred preferences, skill</text>
  <text x="274" y="592" class="m">onUserContextUpdate(...)</text>

  <rect x="468" y="524" width="186" height="84" rx="8" class="state" />
  <text x="480" y="544" class="b">Task context</text>
  <text x="480" y="560" class="m">TaskContext (typed)</text>
  <text x="480" y="574" class="lbl">Active goal, complexity, phase</text>
  <text x="480" y="592" class="m">onTaskContextUpdate(...)</text>

  <rect x="674" y="524" width="186" height="84" rx="8" class="state" />
  <text x="686" y="544" class="b">Working memory imprints</text>
  <text x="686" y="560" class="m">workingMemory.set(k, v)</text>
  <text x="686" y="574" class="lbl">Per-turn scratchpad</text>
  <text x="686" y="592" class="m">onMemoryImprint(content, tags)</text>

  <rect x="880" y="524" width="184" height="84" rx="8" class="state" />
  <text x="892" y="544" class="b">HEXACO traits</text>
  <text x="892" y="560" class="m">PersonaOverlayManager</text>
  <text x="892" y="574" class="lbl">adapt_personality · drift</text>
  <text x="892" y="592" class="m">maxDeltaPerSession-bounded</text>

  <!-- Soft links from middle band to state surfaces -->
  <path d="M 210 448 Q 210 460 210 466" class="arrow-soft" marker-end="url(#ai-arrow)" />
  <path d="M 562 448 Q 562 460 562 466" class="arrow-soft" marker-end="url(#ai-arrow)" />
  <path d="M 912 448 Q 912 460 912 466" class="arrow-soft" marker-end="url(#ai-arrow)" />
</svg>
