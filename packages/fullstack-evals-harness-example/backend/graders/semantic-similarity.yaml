name: "Semantic Similarity"
description: "Measures how close the output meaning is to the expected answer. Adjust threshold in the UI (common values: 0.7 moderate, 0.85 strict, 0.9+ exact)."
type: semantic-similarity
config:
  threshold: 0.8
inspiration: |
  Based on Sentence-BERT (Reimers & Gurevych, 2019). Cosine similarity on
  sentence embeddings captures meaning beyond surface-level string matching.
reference: "https://arxiv.org/abs/1908.10084"
