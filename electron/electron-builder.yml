appId: dev.frame.fabric
productName: FABRIC
copyright: Copyright (c) 2024 Framers

directories:
  output: release
  buildResources: resources

files:
  - dist/**/*
  - "!node_modules/**/*"
  - node_modules/better-sqlite3/**/*
  - node_modules/bindings/**/*
  - node_modules/file-uri-to-path/**/*

extraResources:
  # Bundle the built backend
  - from: ../backend/dist
    to: backend
    filter:
      - "**/*"
      - "!**/*.map"
  # Bundle the built frontend
  - from: ../frontend/dist
    to: renderer
    filter:
      - "**/*"
  # Backend locales if they exist
  - from: ../backend/locales
    to: backend/locales
    filter:
      - "**/*"

asar: true
asarUnpack:
  - "**/*.node"
  - "**/better-sqlite3/**"

# macOS configuration
mac:
  category: public.app-category.productivity
  target:
    - target: dmg
      arch: [x64, arm64]
    - target: zip
      arch: [x64, arm64]
  entitlements: entitlements.mac.plist
  entitlementsInherit: entitlements.mac.plist
  hardenedRuntime: true
  gatekeeperAssess: false
  notarize: false

dmg:
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

# Windows configuration
win:
  target:
    - target: nsis
      arch: [x64]
    - target: portable
      arch: [x64]
  icon: resources/icon.ico
  publisherName: Framers

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true

# Linux configuration
linux:
  target:
    - target: AppImage
      arch: [x64, arm64]
    - target: deb
      arch: [x64]
    - target: rpm
      arch: [x64]
  category: Utility
  icon: resources/icons

# Auto-update configuration
publish:
  provider: github
  owner: framersai
  repo: voice-chat-assistant
  releaseType: release

# Native module rebuild
electronDownload:
  mirror: https://npmmirror.com/mirrors/electron/

afterSign: scripts/notarize.js
