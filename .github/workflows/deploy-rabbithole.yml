name: Deploy RabbitHole (Linode)

on:
  push:
    branches: [master]
    paths:
      - 'apps/rabbithole'
      - 'apps/rabbithole/**'
      - 'backend/**'
      - 'packages/**'
      - 'deployment/rabbithole/**'
      - '.github/workflows/deploy-rabbithole.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.RABBITHOLE_LINODE_HOST }}
          username: root
          key: ${{ secrets.RABBITHOLE_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GH_PAT
          script: |
            set -euo pipefail

            # Use PAT for all github.com HTTPS (needed for private submodules)
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"

            REPO_DIR="/app/rabbithole"
            REPO_URL="https://${GH_PAT}@github.com/manicinc/voice-chat-assistant.git"

            # ── 1. Pull latest code ──
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "[deploy] First deploy — cloning repo..."
              git clone --recurse-submodules "$REPO_URL" "$REPO_DIR"
            else
              echo "[deploy] Pulling latest..."
              cd "$REPO_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin
              git reset --hard origin/master
              git submodule deinit -f --all 2>/dev/null || true
              git submodule update --init --recursive --force
            fi

            cd "$REPO_DIR"

            # ── 2. Build frontend Docker image (handles monorepo deps) ──
            echo "[deploy] Building frontend Docker image..."
            docker build \
              -t rabbithole-frontend:latest \
              -f deployment/rabbithole/Dockerfile.frontend \
              .

            # ── 3. Extract standalone output from Docker image ──
            echo "[deploy] Extracting standalone build..."
            docker rm -f rabbithole-extract 2>/dev/null || true
            docker create --name rabbithole-extract rabbithole-frontend:latest
            rm -rf /opt/rabbithole-staging
            mkdir -p /opt/rabbithole-staging
            docker cp rabbithole-extract:/app/. /opt/rabbithole-staging/
            docker rm rabbithole-extract

            # ── 4. Swap into live directory + restart ──
            echo "[deploy] Deploying to /opt/rabbithole..."
            systemctl stop rabbithole || true
            rm -rf /opt/rabbithole-old
            mv /opt/rabbithole /opt/rabbithole-old 2>/dev/null || true
            mv /opt/rabbithole-staging /opt/rabbithole
            systemctl start rabbithole

            # ── 5. Update API bridge if server.js changed ──
            if [ -f "$REPO_DIR/deployment/rabbithole/api-server.js" ]; then
              echo "[deploy] Updating API bridge..."
              cp "$REPO_DIR/deployment/rabbithole/api-server.js" /opt/rabbithole-api/server.js
              systemctl restart rabbithole-api
            fi

            # ── 6. Cleanup ──
            echo "[deploy] Pruning old Docker images..."
            docker image prune -f
            rm -rf /opt/rabbithole-old

            # ── 7. Health check ──
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            echo "[deploy] Health check: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "[deploy] WARNING: Frontend not returning 200"
              journalctl -u rabbithole --no-pager -n 20
            fi

            echo "[deploy] Done."
