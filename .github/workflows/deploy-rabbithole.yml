name: Deploy RabbitHole (Linode)

on:
  push:
    branches: [master]
    paths:
      - 'apps/rabbithole'
      - 'apps/rabbithole/**'
      - 'backend/**'
      - 'packages/**'
      - 'deployment/rabbithole/**'
      - '.github/workflows/deploy-rabbithole.yml'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.RABBITHOLE_LINODE_HOST }}
          username: root
          key: ${{ secrets.RABBITHOLE_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GH_PAT
          script: |
            set -euo pipefail

            # Use PAT for all github.com HTTPS (needed for private submodules)
            git config --global url."https://${GH_PAT}@github.com/".insteadOf "https://github.com/"

            REPO_DIR="/app/rabbithole"
            REPO_URL="https://${GH_PAT}@github.com/manicinc/voice-chat-assistant.git"

            # ── 1. Pull latest code ──
            if [ ! -d "$REPO_DIR/.git" ]; then
              echo "[deploy] First deploy — cloning repo..."
              git clone --recurse-submodules "$REPO_URL" "$REPO_DIR"
            else
              echo "[deploy] Pulling latest..."
              cd "$REPO_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin
              git reset --hard origin/master
              git submodule deinit -f --all 2>/dev/null || true
              git submodule update --init --recursive --force 2>&1 || {
                echo "[deploy] WARNING: Some submodules failed to init — continuing with partial checkout"
                # Try each critical submodule individually
                for sm in packages/agentos packages/agentos-extensions packages/agentos-extensions-registry packages/agentos-skills-registry apps/rabbithole apps/wunderland-sh; do
                  git submodule update --init "$sm" 2>&1 || echo "[deploy] WARNING: $sm failed"
                done
              }
            fi

            cd "$REPO_DIR"

            # ── 1b. Load env vars (NEXT_PUBLIC_* must be present at build time) ──
            while IFS='=' read -r key val; do
              # Skip comments and empty lines
              [[ "$key" =~ ^#.*$ || -z "$key" ]] && continue
              # Strip surrounding quotes from value
              val="${val%\"}" && val="${val#\"}"
              val="${val%\'}" && val="${val#\'}"
              export "$key=$val"
            done < /etc/rabbithole/env

            # ── 1c. Ensure critical env vars are correct ──
            if ! grep -q '^AUTH_URL=' /etc/rabbithole/env; then
              echo "AUTH_URL=https://rabbithole.inc" >> /etc/rabbithole/env
              echo "[deploy] WARNING: AUTH_URL was missing — auto-added"
            fi
            export AUTH_URL=https://rabbithole.inc

            if ! grep -q '^INTERNAL_API_URL=' /etc/rabbithole/env; then
              echo "INTERNAL_API_URL=http://localhost:3001/api" >> /etc/rabbithole/env
              echo "[deploy] WARNING: INTERNAL_API_URL was missing — auto-added"
            fi

            # NEXT_PUBLIC_API_URL must be /api for production (proxied via nginx).
            # Override regardless of what's in env file — this is build-time critical.
            export NEXT_PUBLIC_API_URL=/api
            export NEXT_PUBLIC_OAUTH_GOOGLE=true
            export NEXT_PUBLIC_OAUTH_GITHUB=true

            # ── 1d. Ensure SearXNG metasearch engine is running ──
            echo "[deploy] Setting up SearXNG..."
            command -v docker >/dev/null || { echo "[deploy] ERROR: Docker not installed"; exit 1; }
            mkdir -p /etc/searxng
            cp "$REPO_DIR/deployment/rabbithole/searxng-settings.yml" /etc/searxng/settings.yml
            docker pull searxng/searxng:latest
            cp "$REPO_DIR/deployment/rabbithole/searxng.service" /etc/systemd/system/searxng.service
            systemctl daemon-reload
            systemctl enable searxng
            systemctl restart searxng
            echo "[deploy] Waiting for SearXNG to be healthy..."
            for i in $(seq 1 12); do
              if wget -q --spider http://localhost:8080/healthz 2>/dev/null; then
                echo "[deploy] SearXNG is healthy"
                break
              fi
              [ "$i" -eq 12 ] && echo "[deploy] WARNING: SearXNG health check failed after 60s"
              sleep 5
            done
            if ! grep -q '^SEARXNG_URL=' /etc/rabbithole/env; then
              echo "SEARXNG_URL=http://localhost:8080" >> /etc/rabbithole/env
              echo "[deploy] Added SEARXNG_URL to env file"
            fi
            export SEARXNG_URL=http://localhost:8080

            # ── 2. Install dependencies ──
            # --ignore-scripts: skip prepare/postinstall lifecycle scripts during install
            # (template packages try to tsc before deps are built; we build explicitly below)
            echo "[deploy] Installing dependencies..."
            pnpm install --no-frozen-lockfile --ignore-scripts

            # ── 3. Build workspace packages in dependency order ──
            echo "[deploy] Building workspace packages..."
            pnpm --filter @framers/shared build
            pnpm --filter @framers/sql-storage-adapter build
            pnpm --filter @framers/agentos build
            pnpm --filter @framers/agentos-extensions-registry build
            pnpm --filter @framers/agentos-ext-web-search build
            pnpm --filter @framers/agentos-ext-web-browser build
            pnpm --filter @framers/agentos-ext-giphy build
            pnpm --filter @framers/agentos-ext-image-search build
            pnpm --filter @framers/agentos-ext-news-search build
            pnpm --filter @framers/agentos-ext-voice-synthesis build
            pnpm --filter @framers/agentos-ext-cli-executor build
            pnpm --filter @framers/agentos-skills-registry build
            pnpm --filter @framers/agentos-ext-skills build
            pnpm --filter wunderland build

            # ── 4. Build Next.js frontend (--webpack needed for standalone output) ──
            echo "[deploy] Building rabbithole frontend..."
            export NODE_OPTIONS="--max-old-space-size=4608"
            pnpm --filter rabbithole exec next build --webpack

            # ── 4b. Verify standalone output exists ──
            STANDALONE_APP="$REPO_DIR/apps/rabbithole/.next/standalone/apps/rabbithole"
            if [ ! -f "$STANDALONE_APP/server.js" ]; then
              echo "[deploy] WARNING: Standalone output not found — retrying build without --webpack..."
              pnpm --filter rabbithole exec next build
              if [ ! -f "$STANDALONE_APP/server.js" ]; then
                echo "[deploy] ERROR: Standalone output still not generated"
                exit 1
              fi
            fi

            # ── 4c. Patch @framers packages into standalone node_modules ──
            echo "[deploy] Patching extension packages into standalone..."
            for pkg in agentos agentos-extensions-registry agentos-ext-web-search \
              agentos-ext-giphy agentos-ext-image-search agentos-ext-news-search \
              agentos-ext-voice-synthesis agentos-ext-cli-executor agentos-ext-web-browser \
              agentos-ext-skills agentos-skills-registry; do
              if [ ! -d "$STANDALONE_APP/node_modules/@framers/$pkg" ]; then
                SRC="$REPO_DIR/node_modules/@framers/$pkg"
                if [ -d "$SRC" ] || [ -L "$SRC" ]; then
                  mkdir -p "$STANDALONE_APP/node_modules/@framers"
                  cp -rL "$SRC" "$STANDALONE_APP/node_modules/@framers/$pkg"
                  echo "[deploy] Patched: @framers/$pkg"
                fi
              fi
            done

            # ── 4d. Fix turbopack hashed external references (Next.js 16) ──
            if [ -f "$STANDALONE_APP/.next/turbopack" ]; then
              echo "[deploy] Turbopack build detected — fixing hashed external references..."
              for hashed in $(grep -ohr '@framers/[a-z0-9_-]*-[a-f0-9]\{12,\}' "$STANDALONE_APP/.next/server/chunks/" 2>/dev/null | sort -u); do
                base=$(echo "$hashed" | sed 's/-[a-f0-9]\{12,\}$//' | sed 's|@framers/||')
                hashed_name=$(echo "$hashed" | sed 's|@framers/||')
                if [ -d "$STANDALONE_APP/node_modules/@framers/$base" ] && [ ! -e "$STANDALONE_APP/node_modules/@framers/$hashed_name" ]; then
                  ln -sfn "$base" "$STANDALONE_APP/node_modules/@framers/$hashed_name"
                  echo "[deploy] Linked: @framers/$hashed_name -> @framers/$base"
                fi
              done
            fi

            # ── 5. Compile bot bootstrap (instrumentation.ts bots aren't traced by webpack) ──
            echo "[deploy] Compiling bot bootstrap with esbuild..."
            node_modules/.bin/esbuild apps/rabbithole/src/bots/index.ts \
              --bundle --platform=node --format=cjs \
              --outfile="$STANDALONE_APP/boot-bots.js" \
              --external:discord.js --external:"@discordjs/*" \
              --external:telegraf --external:openai \
              --external:zlib-sync --external:bufferutil --external:utf-8-validate

            # Generate start.js wrapper that loads Next.js server + bots
            cat > "$STANDALONE_APP/start.js" << 'STARTJS'
            process.env.NEXT_RUNTIME = "nodejs";

            // Start Next.js standalone server FIRST (must not be blocked)
            require("./server.js");

            // Start bots AFTER server is listening (fire-and-forget)
            setTimeout(async () => {
              try {
                const bots = require("./boot-bots.js");
                if (process.env.DISCORD_BOT_ENABLED === "true") {
                  bots.startDiscordBot().catch(e =>
                    console.error("[start.js] Discord bot error:", e.message));
                }
                if (process.env.TELEGRAM_BOT_ENABLED === "true") {
                  bots.startTelegramBot().catch(e =>
                    console.error("[start.js] Telegram bot error:", e.message));
                }
                console.log("[start.js] Bot bootstrap initiated");
              } catch (e) {
                console.error("[start.js] Bot bootstrap error:", e.message);
              }
            }, 2000);
            STARTJS

            # ── 5b. Link static assets into standalone output ──
            ln -sfn "$REPO_DIR/apps/rabbithole/.next/static" "$STANDALONE_APP/.next/static"
            ln -sfn "$REPO_DIR/apps/rabbithole/public" "$STANDALONE_APP/public"

            # ── 5c. Canonical /opt/rabbithole symlink ──
            # The submodule deploy (now disabled) used /opt/rabbithole directly.
            # Keep this path as a symlink so the systemd service always resolves.
            rm -rf /opt/rabbithole
            ln -sfn "$STANDALONE_APP" /opt/rabbithole
            echo "[deploy] /opt/rabbithole -> $STANDALONE_APP"

            # ── 6. Ensure nginx config is correct ──
            echo "[deploy] Syncing nginx config..."
            cp "$REPO_DIR/deployment/rabbithole/nginx-rabbithole.conf" /etc/nginx/sites-available/rabbithole
            ln -sfn /etc/nginx/sites-available/rabbithole /etc/nginx/sites-enabled/rabbithole
            nginx -t && systemctl reload nginx

            # ── 7. Update systemd service + restart ──
            echo "[deploy] Updating systemd service..."
            cp "$REPO_DIR/deployment/rabbithole/rabbithole.service" /etc/systemd/system/rabbithole.service
            systemctl daemon-reload
            systemctl restart rabbithole

            # ── 8. Update API bridge if changed ──
            if [ -f "$REPO_DIR/deployment/rabbithole/api-server.js" ]; then
              echo "[deploy] Updating API bridge..."
              cp "$REPO_DIR/deployment/rabbithole/api-server.js" /opt/rabbithole-api/server.js
              systemctl restart rabbithole-api
            fi

            # ── 9. Health check ──
            sleep 5
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/ || echo "000")
            echo "[deploy] Health check: HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "[deploy] WARNING: Frontend not returning 200"
              journalctl -u rabbithole --no-pager -n 20
            fi

            echo "[deploy] Done."
