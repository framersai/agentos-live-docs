name: Deploy Discord Bots (Linode)

on:
  workflow_dispatch:
  repository_dispatch:
    types: [deploy-discord-bots]

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
        with:
          host: ${{ secrets.RABBITHOLE_LINODE_HOST }}
          username: root
          key: ${{ secrets.RABBITHOLE_SSH_PRIVATE_KEY }}
          command_timeout: 30m
          envs: GH_PAT
          script: |
            set -euo pipefail

            BOTS_DIR="/app/discord-bots"
            BOTS_URL="https://${GH_PAT}@github.com/manicinc/discord-bots.git"
            COMPOSE_DIR="/app/rabbithole/deployment/rabbithole"
            COMPOSE_FILE="$COMPOSE_DIR/docker-compose.discord-bots.yml"

            # ── 1. Pull latest discord-bots code ──
            if [ ! -d "$BOTS_DIR/.git" ]; then
              echo "[deploy] First deploy — cloning discord-bots..."
              git clone "$BOTS_URL" "$BOTS_DIR"
            else
              echo "[deploy] Pulling latest discord-bots..."
              cd "$BOTS_DIR"
              git remote set-url origin "$BOTS_URL"
              git fetch origin
              git reset --hard origin/master
            fi

            # ── 2. Pull latest voice-chat-assistant (for compose file + nginx) ──
            REPO_DIR="/app/rabbithole"
            REPO_URL="https://${GH_PAT}@github.com/manicinc/voice-chat-assistant.git"
            if [ -d "$REPO_DIR/.git" ]; then
              cd "$REPO_DIR"
              git remote set-url origin "$REPO_URL"
              git fetch origin
              git reset --hard origin/master
              git submodule update --init --recursive --force 2>&1 || true
            fi

            # ── 3. Ensure data directory exists ──
            mkdir -p /mnt/storage/discord-bots/data

            # ── 4. Ensure env file exists ──
            if [ ! -f /etc/rabbithole/discord-bots.env ]; then
              echo "[deploy] WARNING: /etc/rabbithole/discord-bots.env not found"
              echo "[deploy] Copy the template and fill in values:"
              echo "[deploy]   cp $COMPOSE_DIR/discord-bots.env.example /etc/rabbithole/discord-bots.env"
              exit 1
            fi

            # ── 5. Build and deploy containers ──
            echo "[deploy] Building discord-bots Docker image..."
            cd "$COMPOSE_DIR"
            docker compose -f docker-compose.discord-bots.yml build

            echo "[deploy] Starting containers..."
            docker compose -f docker-compose.discord-bots.yml up -d

            # ── 6. Update nginx config ──
            echo "[deploy] Syncing nginx config..."
            cp "$COMPOSE_DIR/nginx-rabbithole.conf" /etc/nginx/sites-available/rabbithole
            ln -sfn /etc/nginx/sites-available/rabbithole /etc/nginx/sites-enabled/rabbithole
            nginx -t && systemctl reload nginx

            # ── 7. Health check ──
            echo "[deploy] Waiting for scraper API to start..."
            for i in $(seq 1 12); do
              if curl -sf http://localhost:8420/health >/dev/null 2>&1; then
                echo "[deploy] Scraper API is healthy"
                break
              fi
              [ "$i" -eq 12 ] && echo "[deploy] WARNING: Scraper API health check failed after 60s"
              sleep 5
            done

            # ── 8. Container status ──
            echo "[deploy] Container status:"
            docker compose -f docker-compose.discord-bots.yml ps

            echo "[deploy] Done."
