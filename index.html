<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AgentOS Docs</title>
    <meta name="description" content="AgentOS documentation. Adaptive AI intelligence for enterprise-ready agents.">
    <link rel="icon" href="/favicon.svg">
    <style>
      :root {
        --bg: #0b0c10;
        --card: #111319;
        --text: #e6e8ee;
        --muted: #a4a9b6;
        --accent1: #6b7cff;
        --accent2: #d16cff;
      }
      html, body { height: 100%; }
      body {
        margin: 0;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
        color: var(--text);
        background:
          radial-gradient(60% 40% at 20% 0%, rgba(107,124,255,0.12), transparent 70%),
          radial-gradient(50% 35% at 100% 100%, rgba(209,108,255,0.12), transparent 70%),
          linear-gradient(180deg, #0a0b10, #0b0c10);
      }
      .container {
        min-height: 100%;
        display: grid;
        place-items: center;
        padding: 2rem;
      }
      .card {
        max-width: 760px;
        width: 100%;
        background: linear-gradient(135deg, rgba(107,124,255,0.05), rgba(209,108,255,0.03));
        border: 1px solid rgba(230,232,238,0.08);
        border-radius: 16px;
        padding: 2rem;
        box-shadow: 0 20px 60px -15px rgba(107,124,255,0.25);
      }
      h1 { margin: 0 0 0.5rem; font-size: 2rem; letter-spacing: -0.02em; }
      p { margin: 0.5rem 0; color: var(--muted); }
      .links { margin-top: 1rem; display: flex; gap: 0.75rem; flex-wrap: wrap; }
      .btn {
        display: inline-flex; align-items: center; gap: 0.5rem;
        padding: 0.6rem 0.9rem; border-radius: 12px; font-weight: 600;
        text-decoration: none; transition: transform 220ms ease, box-shadow 220ms ease;
      }
      .btn.primary {
        color: white; background: linear-gradient(90deg, var(--accent1), var(--accent2));
        box-shadow: 0 12px 28px -12px rgba(107,124,255,0.45);
      }
      .btn.secondary {
        color: var(--accent1);
        background:
          linear-gradient(#0d0f16, #0d0f16) padding-box,
          linear-gradient(90deg, rgba(107,124,255,0.55), rgba(209,108,255,0.45)) border-box;
        border: 2px solid transparent;
      }
      .btn:hover { transform: translateY(-2px); }
      .note { margin-top: 1rem; font-size: 0.9rem; color: var(--muted); }
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
    </style>
  </head>
  <body>
    <div class="container">
      <main class="card" role="main" aria-labelledby="title">
        <h1 id="title">AgentOS Documentation</h1>
        <p>Adaptive AI intelligence for enterprise‑ready agents. API reference and guides will live here.</p>
        <div class="links" role="navigation" aria-label="Quick links">
          <a class="btn primary" href="/docs/">
            Open API Reference
          </a>
          <a class="btn secondary" href="https://agentos.sh/">
            Back to agentos.sh
          </a>
          <a class="btn secondary" href="https://github.com/framersai/agentos">
            GitHub
          </a>
        </div>
        <p class="note">Tip: push generated TypeDoc output into the <span class="mono">/docs</span> folder of this repo. This site is deployed via GitHub Pages.</p>
      </main>
    </div>
  </body>
  </html>
