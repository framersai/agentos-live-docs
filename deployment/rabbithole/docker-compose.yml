services:
  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    volumes:
      - ./searxng-settings.yml:/etc/searxng/settings.yml:ro
      - searxng-data:/var/cache/searxng
    expose:
      - "8080"
    environment:
      - SEARXNG_BASE_URL=http://searxng:8080/
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/healthz || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ../..
      dockerfile: deployment/rabbithole/Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      searxng:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - PORT=3010
      - BACKEND_PORT=3001
      - NEXT_PUBLIC_API_URL=/api
      - NODE_ENV=production
      - SEARXNG_URL=http://searxng:8080
    expose:
      - "3010"
      - "3001"
    volumes:
      # Persist SQLite DB on the encrypted block volume
      - /mnt/storage/postgres:/app/db_data
      # Media uploads
      - /mnt/storage/media:/app/media
      # VA admin email list
      - ./va-admins.csv:/app/va-admins.csv:ro

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /mnt/storage/logs/nginx:/var/log/nginx
      - /app/ssl/origin.crt:/etc/ssl/origin.crt:ro
      - /app/ssl/origin.key:/etc/ssl/origin.key:ro

volumes:
  searxng-data:
