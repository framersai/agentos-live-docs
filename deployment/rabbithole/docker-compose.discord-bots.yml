##
## Discord Bots — Scraper API (headless data endpoints)
##
## The Python Discord gateway bots (wunderbot-news, wunderbot-agent) have been
## replaced by the Wunderland TypeScript agent (systemd: wunderland-agent).
## Only the scraper API remains as a headless data source.
##
## Deploy: docker compose -f docker-compose.discord-bots.yml up -d --build
## Logs:   docker compose -f docker-compose.discord-bots.yml logs -f
##

services:
  scraper-api:
    build:
      context: /app/discord-bots
      dockerfile: Dockerfile
    image: discord-bots:latest
    container_name: scraper-api
    restart: unless-stopped
    env_file:
      - /etc/rabbithole/discord-bots.env
    ports:
      - "127.0.0.1:8420:8420"
    volumes:
      - /mnt/storage/discord-bots/data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8420/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
