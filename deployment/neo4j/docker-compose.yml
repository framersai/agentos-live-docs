version: '3.9'

services:
  neo4j:
    image: neo4j:5.26-community
    container_name: agentos-neo4j
    restart: unless-stopped
    ports:
      - '7474:7474'  # HTTP (Neo4j Browser)
      - '7687:7687'  # Bolt (driver connections)
    volumes:
      - ../../db_data/neo4j/data:/data
      - ../../db_data/neo4j/logs:/logs
      - ../../db_data/neo4j/plugins:/plugins
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-agentos-dev}
      # Enable APOC plugin (community-compatible)
      NEO4J_PLUGINS: '["apoc"]'
      # Allow APOC procedures
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_security_procedures_allowlist: apoc.*
      # Memory settings for development
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1g
      NEO4J_server_memory_pagecache_size: 512m
      # Enable vector index support (Neo4j 5.11+)
      NEO4J_dbms_security_auth__minimum__password__length: 4
    healthcheck:
      test: ['CMD', 'neo4j', 'status']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
